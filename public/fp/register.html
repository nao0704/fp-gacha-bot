<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FPガチャ｜FP登録フォーム</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: #07111f;
      color: #fff;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .header {
      background: linear-gradient(135deg, #0f2460 0%, #1a4a7a 60%, #0d7a5f 100%);
      padding: 52px 24px 72px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .header::after {
      content: '';
      position: absolute;
      bottom: -2px; left: 0; right: 0;
      height: 52px;
      background: #07111f;
      clip-path: ellipse(55% 100% at 50% 100%);
    }
    .header-badge {
      display: inline-block;
      background: rgba(126,232,200,0.15);
      color: #7ee8c8;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 6px 18px;
      border-radius: 999px;
      margin-bottom: 20px;
      letter-spacing: 0.12em;
      border: 1px solid rgba(126,232,200,0.3);
    }
    .header h1 {
      font-size: clamp(1.7rem, 5vw, 2.5rem);
      font-weight: 900;
      color: #fff;
      margin-bottom: 14px;
      line-height: 1.25;
    }
    .header h1 em { font-style: normal; color: #7ee8c8; }
    .header-sub {
      font-size: 0.93rem;
      color: rgba(255,255,255,0.72);
      line-height: 1.85;
    }

    /* ── MAIN ── */
    main {
      max-width: 600px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    /* ── STEPS BAR ── */
    .steps-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 36px;
    }
    .step-dot {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: rgba(26,74,122,0.6);
      color: rgba(255,255,255,0.35);
      font-size: 0.82rem;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .step-dot.active {
      background: #7ee8c8;
      color: #0f2460;
      border-color: #7ee8c8;
    }
    .step-line { flex: 1; max-width: 48px; height: 2px; background: rgba(255,255,255,0.1); }

    /* ── ERROR ── */
    .error-msg {
      background: rgba(255,80,80,0.12);
      border: 1px solid rgba(255,80,80,0.35);
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 0.88rem;
      color: #ff8888;
      margin-bottom: 24px;
      display: none;
    }
    .error-msg.show { display: block; }

    /* ── FORM CARD ── */
    .form-card {
      background: rgba(26, 74, 122, 0.18);
      border: 1px solid rgba(126,232,200,0.12);
      border-radius: 24px;
      padding: 40px 36px;
      backdrop-filter: blur(10px);
    }
    @media (max-width: 480px) { .form-card { padding: 28px 20px; } }

    .sec-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: #7ee8c8;
      margin-bottom: 6px;
    }
    .sec-title {
      font-size: 1.05rem;
      font-weight: 900;
      color: #fff;
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .sec-title small {
      display: block;
      font-size: 0.82rem;
      font-weight: 400;
      color: rgba(255,255,255,0.45);
      margin-top: 4px;
    }
    .form-divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.08);
      margin: 36px 0;
    }

    /* ── INPUT ── */
    .field-label {
      display: block;
      font-size: 0.88rem;
      font-weight: 700;
      color: rgba(255,255,255,0.88);
      margin-bottom: 10px;
    }
    .field-label .badge-req {
      display: inline-block;
      background: #0d7a5f;
      color: #fff;
      font-size: 0.68rem;
      padding: 2px 8px;
      border-radius: 999px;
      margin-left: 8px;
      vertical-align: middle;
      font-weight: 700;
    }
    .text-input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 12px;
      padding: 15px 18px;
      font-size: 1rem;
      font-family: 'Noto Sans JP', sans-serif;
      color: #fff;
      transition: border-color 0.2s, background 0.2s;
      outline: none;
    }
    .text-input::placeholder { color: rgba(255,255,255,0.28); }
    .text-input:focus {
      border-color: #7ee8c8;
      background: rgba(126,232,200,0.05);
    }

    /* ── CHECKBOXES（専門領域） ── */
    .check-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
      gap: 10px;
    }
    .check-item { position: relative; }
    .check-item input[type="checkbox"] {
      position: absolute; opacity: 0; width: 0; height: 0;
    }
    .check-item label {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 12px;
      padding: 13px 16px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 700;
      color: rgba(255,255,255,0.65);
      transition: all 0.15s;
      user-select: none;
    }
    .check-item label::before {
      content: '';
      width: 18px; height: 18px;
      border-radius: 5px;
      border: 2px solid rgba(255,255,255,0.25);
      flex-shrink: 0;
      transition: all 0.15s;
      display: flex; align-items: center; justify-content: center;
    }
    .check-item input:checked + label {
      background: rgba(126,232,200,0.1);
      border-color: #7ee8c8;
      color: #7ee8c8;
    }
    .check-item input:checked + label::before {
      background: #7ee8c8;
      border-color: #7ee8c8;
      content: '✓';
      font-size: 0.75rem;
      color: #0f2460;
      font-weight: 900;
    }

    /* ── 対応形式 ── */
    .format-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .format-item { position: relative; flex: 1; min-width: 140px; }
    .format-item input[type="checkbox"] {
      position: absolute; opacity: 0; width: 0; height: 0;
    }
    .format-item label {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 14px;
      padding: 18px 16px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 700;
      color: rgba(255,255,255,0.65);
      transition: all 0.15s;
      user-select: none;
      text-align: center;
    }
    .format-item label .fmt-icon { font-size: 1.5rem; }
    .format-item input:checked + label {
      background: rgba(126,232,200,0.1);
      border-color: #7ee8c8;
      color: #7ee8c8;
    }

    /* ── SUBMIT ── */
    .submit-area { margin-top: 40px; }
    .submit-btn {
      width: 100%;
      background: linear-gradient(135deg, #7ee8c8, #4ecba0);
      color: #0f2460;
      border: none;
      border-radius: 999px;
      padding: 18px 24px;
      font-size: 1.05rem;
      font-weight: 900;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 8px 32px rgba(126,232,200,0.2);
    }
    .submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(126,232,200,0.3);
    }
    .submit-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .submit-note {
      text-align: center;
      font-size: 0.82rem;
      color: rgba(255,255,255,0.38);
      margin-top: 14px;
      line-height: 1.75;
    }

    /* ── FOOTER ── */
    footer {
      background: #0f2460;
      color: rgba(255,255,255,0.3);
      text-align: center;
      padding: 24px;
      font-size: 0.82rem;
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header-badge">FP PARTNER REGISTRATION</div>
  <h1>FPガチャに<br><em>パートナー登録する</em></h1>
  <p class="header-sub">
    登録完了まで約5分。Googleカレンダーを連携するだけで<br>
    新規相談者の自動マッチングが始まります。
  </p>
</header>

<main>
  <div class="steps-bar">
    <div class="step-dot active">1</div>
    <div class="step-line"></div>
    <div class="step-dot active">2</div>
    <div class="step-line"></div>
    <div class="step-dot">3</div>
  </div>

  <div id="errorMsg" class="error-msg"></div>

  <div class="form-card">
    <form id="regForm" method="POST" action="/fp/register" novalidate>

      <!-- STEP 1: FP名 -->
      <p class="sec-label">STEP 1</p>
      <p class="sec-title">お名前を入力してください</p>
      <div>
        <label class="field-label" for="fpName">
          フルネーム <span class="badge-req">必須</span>
        </label>
        <input class="text-input" type="text" id="fpName" name="name"
               placeholder="例：山田 太郎" autocomplete="name">
      </div>

      <hr class="form-divider">

      <!-- STEP 2: 専門領域 -->
      <p class="sec-label">STEP 2</p>
      <p class="sec-title">
        専門領域を選択してください
        <small>複数選択可 <span class="badge-req" style="font-size:0.68rem">1つ以上必須</span></small>
      </p>
      <div class="check-grid">
        <div class="check-item">
          <input type="checkbox" id="sp_ins" name="specialties" value="insurance">
          <label for="sp_ins">🛡️ 保険</label>
        </div>
        <div class="check-item">
          <input type="checkbox" id="sp_ast" name="specialties" value="asset">
          <label for="sp_ast">📈 資産運用</label>
        </div>
        <div class="check-item">
          <input type="checkbox" id="sp_re" name="specialties" value="real_estate">
          <label for="sp_re">🏠 住宅ローン</label>
        </div>
        <div class="check-item">
          <input type="checkbox" id="sp_edu" name="specialties" value="education">
          <label for="sp_edu">🎓 教育費</label>
        </div>
        <div class="check-item">
          <input type="checkbox" id="sp_ret" name="specialties" value="retirement">
          <label for="sp_ret">🌅 老後資金</label>
        </div>
        <div class="check-item">
          <input type="checkbox" id="sp_tax" name="specialties" value="tax">
          <label for="sp_tax">💴 節税</label>
        </div>
        <div class="check-item">
          <input type="checkbox" id="sp_inh" name="specialties" value="inheritance">
          <label for="sp_inh">📜 相続</label>
        </div>
      </div>

      <hr class="form-divider">

      <!-- STEP 3: 対応形式 -->
      <p class="sec-label">STEP 3</p>
      <p class="sec-title">
        対応可能な相談形式
        <small>複数選択可</small>
      </p>
      <div class="format-group">
        <div class="format-item">
          <input type="checkbox" id="fmt_online" name="formats" value="online" checked>
          <label for="fmt_online">
            <span class="fmt-icon">💻</span> オンライン
          </label>
        </div>
        <div class="format-item">
          <input type="checkbox" id="fmt_face" name="formats" value="inperson">
          <label for="fmt_face">
            <span class="fmt-icon">🤝</span> 対面
          </label>
        </div>
      </div>

      <!-- SUBMIT -->
      <div class="submit-area">
        <button type="submit" class="submit-btn" id="submitBtn">
          <svg width="20" height="20" viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Googleカレンダーを連携して登録完了
        </button>
        <p class="submit-note">
          クリックするとGoogleの認証画面に移動します。<br>
          認証後、自動でFP登録が完了します。登録は無料です。
        </p>
      </div>

    </form>
  </div>
</main>

<footer>
  &copy; 2025 FPガチャ. All rights reserved.
</footer>

<script>
  const params = new URLSearchParams(location.search);
  const errEl = document.getElementById('errorMsg');
  const msgs = {
    name:      'FP名（フルネーム）を入力してください。',
    specialty: '専門領域を1つ以上選択してください。',
    format:    '対応可能な相談形式を1つ以上選択してください。',
  };
  const errKey = params.get('error');
  if (errKey && msgs[errKey]) {
    errEl.textContent = msgs[errKey];
    errEl.classList.add('show');
    errEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  // Client-side validation before submit
  document.getElementById('regForm').addEventListener('submit', function(e) {
    errEl.classList.remove('show');
    const name = document.getElementById('fpName').value.trim();
    const specialties = document.querySelectorAll('input[name="specialties"]:checked');
    const formats = document.querySelectorAll('input[name="formats"]:checked');

    if (!name) {
      e.preventDefault();
      errEl.textContent = msgs.name;
      errEl.classList.add('show');
      errEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
      return;
    }
    if (!specialties.length) {
      e.preventDefault();
      errEl.textContent = msgs.specialty;
      errEl.classList.add('show');
      errEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
      return;
    }
    if (!formats.length) {
      e.preventDefault();
      errEl.textContent = msgs.format;
      errEl.classList.add('show');
      errEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
      return;
    }

    document.getElementById('submitBtn').disabled = true;
    document.getElementById('submitBtn').textContent = '処理中…';
  });
</script>
</body>
</html>
